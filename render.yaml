services:
  - type: web
    name: friends-memories-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MONGODB_URI_BRANCH1
        sync: false
      - key: MONGODB_URI_BRANCH2
        sync: false
